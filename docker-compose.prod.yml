version: "3.9"

services:
  api:
    build: ./backend
    container_name: nerteus-api
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env.production
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: nerteus-web
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env.production
    ports:
      - "3003:3003"
    depends_on:
      - api
