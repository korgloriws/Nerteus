version: "3.9"

services:
  api:
    build: ./backend
    working_dir: /app
    environment:
      DATABASE_URL: sqlite:///./data/app.db
      SECRET_KEY: change-me
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build: ./frontend
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
    ports:
      - "3003:3003"
    depends_on:
      - api

